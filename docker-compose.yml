version: "3.9"

volumes:
  postgres_data:
  redis_data:

networks:
  aiedu:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: aiedu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aiedu
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aiedu"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aiedu

  redis:
    image: redis:7-alpine
    container_name: aiedu-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aiedu

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: aiedu-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aiedu
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aiedu

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: aiedu-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      API_URL: http://api:3001
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - aiedu
